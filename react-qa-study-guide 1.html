<script>
const catLabels = {
  hooks: 'Hooks',
  context: 'Context API',
  redux: 'Redux',
  basics: 'React Basics',
  advanced: 'Advanced',
  tricky: 'Tricky'
};

const questions = [

  // ===== REACT BASICS (10) — NEW =====
  {
    id: 101, category: "basics", difficulty: "Basic",
    q: "What is JSX and how does it differ from HTML?",
    a: `<p><strong>JSX (JavaScript XML)</strong> is a syntax extension that lets you write HTML-like markup inside JavaScript. It's not valid HTML or JavaScript — it gets <strong>transpiled by Babel/SWC</strong> into <code>React.createElement()</code> calls.</p>
<p><strong>Key differences from HTML:</strong></p>
<ul>
<li><code>class</code> → <code>className</code> (because <code>class</code> is a reserved word in JS).</li>
<li><code>for</code> → <code>htmlFor</code>.</li>
<li>Self-closing tags are mandatory: <code>&lt;img /&gt;</code>, <code>&lt;br /&gt;</code>.</li>
<li>Inline styles use objects: <code>style={{ color: 'red' }}</code> not <code>style="color: red"</code>.</li>
<li>You can embed JavaScript expressions with <code>{curly braces}</code>.</li>
</ul>
<pre>// JSX
const element = &lt;h1 className="title"&gt;Hello, {name}!&lt;/h1&gt;;

// What Babel produces:
const element = React.createElement('h1',
  { className: 'title' },
  'Hello, ', name, '!'
);</pre>
<div class="dotnet-note">JSX is like Razor syntax (<code>@{ }</code>) in ASP.NET MVC/Blazor — it mixes markup and C# code. The key difference: Razor runs server-side while JSX is compiled to JavaScript at build time.</div>`
  },
  {
    id: 102, category: "basics", difficulty: "Basic",
    q: "What is the Virtual DOM and how does React's reconciliation work?",
    a: `<p>The <strong>Virtual DOM (VDOM)</strong> is a lightweight, in-memory JavaScript object tree that mirrors the real DOM. When state changes:</p>
<ol>
<li><strong>React creates a new VDOM tree</strong> reflecting the new state.</li>
<li><strong>Diffing</strong> — React compares the new VDOM with the previous one using its reconciliation algorithm.</li>
<li><strong>Patching</strong> — only the differences are applied to the real DOM (minimal DOM operations).</li>
</ol>
<p><strong>Reconciliation rules:</strong></p>
<ul>
<li>Elements of <strong>different types</strong> produce different trees (old tree is destroyed).</li>
<li>The <code>key</code> prop helps React identify which items in a list have changed, moved, or been removed.</li>
<li>React compares <strong>same-type elements</strong> and only updates changed attributes.</li>
</ul>
<div class="dotnet-note">Think of the VDOM as an in-memory diff engine — like how Git computes deltas between commits. Only the "changed lines" (DOM nodes) are applied. In .NET terms, it's similar to how EF Core's Change Tracker detects modified properties and generates <code>UPDATE</code> SQL for only those columns.</div>`
  },
  {
    id: 103, category: "basics", difficulty: "Basic",
    q: "What is the difference between controlled and uncontrolled components?",
    a: `<p><strong>Controlled components:</strong> React state is the single source of truth for the input value. Every keystroke calls a handler that updates state, which re-renders the input.</p>
<pre>// Controlled
const [name, setName] = useState('');
&lt;input value={name} onChange={e => setName(e.target.value)} /&gt;</pre>
<p><strong>Uncontrolled components:</strong> The DOM itself holds the value. You read it via a <code>ref</code> when needed (e.g., on submit).</p>
<pre>// Uncontrolled
const inputRef = useRef();
&lt;input ref={inputRef} defaultValue="initial" /&gt;
// Read: inputRef.current.value</pre>
<p><strong>When to use each:</strong></p>
<ul>
<li><strong>Controlled</strong> — when you need instant validation, conditional disabling, formatted inputs, or the value drives other UI. This is the default recommendation.</li>
<li><strong>Uncontrolled</strong> — simple forms, file inputs (<code>&lt;input type="file" /&gt;</code> is always uncontrolled), or integrating with non-React libraries.</li>
</ul>
<div class="dotnet-note">Controlled ≈ two-way data binding in Blazor (<code>@bind</code>). Uncontrolled ≈ using <code>document.getElementById</code> in traditional ASP.NET WebForms — the DOM owns the value.</div>`
  },
  {
    id: 104, category: "basics", difficulty: "Basic",
    q: "What are keys in React and why are they important?",
    a: `<p>Keys are <strong>unique identifiers</strong> you assign to elements in a list so React can track which items changed, were added, or removed during reconciliation.</p>
<pre>// ✅ Use stable, unique IDs
{users.map(user =>
  &lt;UserCard key={user.id} user={user} /&gt;
)}

// ❌ Don't use array index as key (usually)
{users.map((user, index) =>
  &lt;UserCard key={index} user={user} /&gt;  // bugs with reorder/delete
)}</pre>
<p><strong>Why index is bad:</strong> When items are reordered, inserted, or deleted, index-based keys cause React to re-use the wrong DOM elements — leading to stale state, broken animations, and input value swaps.</p>
<p><strong>Index is okay when:</strong> the list is static, never reordered, and items have no local state.</p>
<div class="dotnet-note">Keys serve the same purpose as primary keys in a database — they uniquely identify each record so the system knows which row to update, insert, or delete rather than rebuilding the entire table.</div>`
  },
  {
    id: 105, category: "basics", difficulty: "Basic",
    q: "What is lifting state up? When and why do you do it?",
    a: `<p><strong>Lifting state up</strong> means moving shared state to the <strong>closest common ancestor</strong> of the components that need it, then passing it down as props.</p>
<pre>// Before: Each input manages its own state independently
// After: Parent owns the state, children are controlled

function TemperatureConverter() {
  const [celsius, setCelsius] = useState(0);
  const fahrenheit = (celsius * 9/5) + 32;

  return (
    &lt;&gt;
      &lt;TempInput label="Celsius" value={celsius}
        onChange={setCelsius} /&gt;
      &lt;TempInput label="Fahrenheit" value={fahrenheit}
        onChange={f => setCelsius((f - 32) * 5/9)} /&gt;
    &lt;/&gt;
  );
}</pre>
<p><strong>When to lift:</strong> Two or more sibling components need to reflect the same changing data. <strong>Don't over-lift</strong> — if only one component uses the state, keep it local.</p>
<div class="dotnet-note">This is like moving a shared variable from a private field in two separate classes to a parent orchestrator. In .NET terms, it's similar to promoting a local variable to a ViewModel property that multiple partial views can bind to.</div>`
  },
  {
    id: 106, category: "basics", difficulty: "Intermediate",
    q: "What are Error Boundaries and how do you implement them?",
    a: `<p>Error Boundaries are React components that <strong>catch JavaScript errors in their child component tree</strong>, log them, and display a fallback UI instead of crashing the entire app.</p>
<pre>class ErrorBoundary extends React.Component {
  state = { hasError: false, error: null };

  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }

  componentDidCatch(error, errorInfo) {
    logErrorToService(error, errorInfo); // Send to Sentry, etc.
  }

  render() {
    if (this.state.hasError) {
      return &lt;h2&gt;Something went wrong.&lt;/h2&gt;;
    }
    return this.props.children;
  }
}

// Usage
&lt;ErrorBoundary&gt;
  &lt;MyRiskyComponent /&gt;
&lt;/ErrorBoundary&gt;</pre>
<p><strong>Important:</strong> Error boundaries are <strong>class components only</strong> (no hook equivalent yet). They do <strong>NOT</strong> catch errors in event handlers, async code, SSR, or in the boundary itself. For production, use the <code>react-error-boundary</code> library which provides a functional API.</p>
<div class="dotnet-note">Error boundaries are like <code>try/catch</code> blocks wrapping sections of your UI — similar to ASP.NET's exception middleware or Blazor's <code>&lt;ErrorBoundary&gt;</code> component that shows fallback content when a child component throws.</div>`
  },
  {
    id: 107, category: "basics", difficulty: "Intermediate",
    q: "What are React Portals and when would you use them?",
    a: `<p>Portals let you <strong>render a child into a different DOM node</strong> outside of the parent component's DOM hierarchy, while keeping it inside the React tree (events still bubble up).</p>
<pre>import { createPortal } from 'react-dom';

function Modal({ children, isOpen }) {
  if (!isOpen) return null;
  return createPortal(
    &lt;div className="modal-overlay"&gt;
      &lt;div className="modal-content"&gt;{children}&lt;/div&gt;
    &lt;/div&gt;,
    document.getElementById('modal-root') // outside #root
  );
}</pre>
<p><strong>Use cases:</strong> Modals/dialogs, tooltips, floating menus, toast notifications — anything that needs to <strong>visually escape</strong> its parent's <code>overflow: hidden</code> or <code>z-index</code> stacking context.</p>
<p><strong>Key insight:</strong> Even though the DOM node is elsewhere, React events still propagate through the React component tree — a click inside a Portal will trigger a parent's <code>onClick</code> handler.</p>
<div class="dotnet-note">Similar to rendering a partial view into a different layout section in ASP.NET MVC (<code>@RenderSection</code>), or Blazor's <code>RenderFragment</code> being projected into a different part of the page.</div>`
  },
  {
    id: 108, category: "basics", difficulty: "Basic",
    q: "What is the difference between props and state?",
    a: `<p><strong>Props</strong> (properties) and <strong>state</strong> both hold data that influences rendering, but they serve different purposes:</p>
<ul>
<li><strong>Props</strong> — passed <strong>from parent to child</strong>. Immutable from the child's perspective. Think of them as function arguments.</li>
<li><strong>State</strong> — managed <strong>within the component</strong>. Mutable (via setState/useState). Think of it as the component's private, local data.</li>
</ul>
<pre>// Props: parent passes data down
&lt;UserCard name="Alice" role="admin" /&gt;

// State: component manages its own data
function Counter() {
  const [count, setCount] = useState(0);
  return &lt;button onClick={() => setCount(c => c + 1)}&gt;{count}&lt;/button&gt;;
}</pre>
<p><strong>Golden rule:</strong> If a component doesn't need to change a value, it should receive it as a prop. If it owns and modifies the value, it's state.</p>
<div class="dotnet-note">Props ≈ constructor parameters or method arguments in C#. State ≈ private fields with property setters. Props flow down (like readonly parameters); state is internal and triggers re-renders (like <code>INotifyPropertyChanged</code> in WPF/MVVM).</div>`
  },
  {
    id: 109, category: "basics", difficulty: "Intermediate",
    q: "How does conditional rendering work in React? What patterns are common?",
    a: `<p>React renders different UI based on conditions using standard JavaScript expressions inside JSX:</p>
<pre>// Pattern 1: Ternary (inline if-else)
{isLoggedIn ? &lt;Dashboard /&gt; : &lt;LoginForm /&gt;}

// Pattern 2: Logical AND (show or nothing)
{hasNotifications && &lt;NotificationBadge count={count} /&gt;}

// Pattern 3: Early return
function UserProfile({ user }) {

<li><strong>Date/time</strong> — <code>new Date()</code> differs between server and client.</li>
<li><strong>Random values</strong> — <code>Math.random()</code> or <code>crypto.randomUUID()</code>.</li>
<li><strong>Browser-only APIs</strong> — <code>window.innerWidth</code>, <code>localStorage</code> on the server.</li>
<li><strong>Invalid HTML nesting</strong> — <code>&lt;p&gt;&lt;div&gt;...&lt;/div&gt;&lt;/p&gt;</code> (browsers auto-correct).</li>
<li><strong>Third-party extensions</strong> — browser extensions that modify the DOM.</li>

    q: "What is Concurrent Rendering in React 18/19? How does it differ from synchronous rendering?",
    a: `<p>In <strong>synchronous rendering</strong> (React 17 and earlier), once React starts rendering a component tree, it cannot be interrupted — the main thread is blocked until every component has rendered and the DOM is updated.</p>
<p><strong>Concurrent rendering</strong> (React 18+) allows React to <strong>pause, interrupt, and resume</strong> rendering work:</p>
<ul>
<li>React can start rendering an update, pause to handle a more urgent update (like a keystroke), then resume the original work.</li>
<li>It renders in memory <strong>without committing to the DOM</strong> until the full tree is ready.</li>
<li>Multiple versions of the UI can be "in progress" simultaneously.</li>
</ul>
<pre>// Concurrent features that use this:
// 1. useTransition — mark updates as non-urgent
const [isPending, startTransition] = useTransition();
startTransition(() =&gt; setSearchResults(filtered));

// 2. useDeferredValue — defer a value
const deferredQuery = useDeferredValue(query);

// 3. Suspense — pause rendering while data loads
&lt;Suspense fallback={&lt;Spinner /&gt;}&gt;
  &lt;LazyComponent /&gt;
&lt;/Suspense&gt;</pre>
<p><strong>Key insight:</strong> Concurrent mode is <strong>opt-in per update</strong>, not a global switch. Regular <code>setState</code> calls are still synchronous (urgent). Only updates wrapped in <code>startTransition</code> or <code>useDeferredValue</code> use concurrent scheduling.</p>
<div class="dotnet-note">Think of synchronous rendering as a single-threaded request pipeline (classic ASP.NET). Concurrent rendering is like ASP.NET Core's async pipeline — requests can yield the thread, allowing higher-priority work to execute. The <code>startTransition</code> API is like <code>Task.Run</code> with lower <code>ThreadPool</code> priority.</div>`
  },

    q: "What is 'tearing' in concurrent React? What is useSyncExternalStore?",
    a: `<p><strong>Tearing</strong> occurs when different parts of the UI show <strong>inconsistent state</strong> because an external store updated mid-render during concurrent rendering. React might render component A with version 1 of the data, get interrupted, then render component B with version 2.</p>
<p><code>useSyncExternalStore</code> (React 18) solves this by ensuring consistent reads from external stores during concurrent renders:</p>
<pre>import { useSyncExternalStore } from 'react';

function useExternalStore() {
  return useSyncExternalStore(
    store.subscribe,       // how to subscribe
    store.getSnapshot,     // how to get current value (client)
    store.getServerSnapshot // how to get value during SSR
  );
}

// Example with a simple external store
const store = {
  _value: 0,
  _listeners: new Set(),
  subscribe(callback) {
    store._listeners.add(callback);
    return () =&gt; store._listeners.delete(callback);
  },
  getSnapshot() { return store._value; },
};</pre>
<p><strong>When you need it:</strong> When consuming external state stores (non-React state, browser APIs like <code>matchMedia</code>, third-party state libraries). Redux and Zustand use this internally.</p>
<div class="dotnet-note">Tearing is like a dirty read in SQL (READ UNCOMMITTED isolation). <code>useSyncExternalStore</code> enforces snapshot isolation — all components see the same consistent version of external state during a render pass, like <code>SNAPSHOT</code> isolation in SQL Server.</div>`

    q: "What is Streaming SSR and Selective Hydration? How do they improve performance?",
    a: `<p><strong>Streaming SSR</strong> (React 18+) sends HTML to the browser <strong>progressively</strong> instead of waiting for the entire page to render server-side. Combined with <code>&lt;Suspense&gt;</code>, slow sections show fallbacks while fast sections are sent immediately.</p>
<pre>// Server renders this progressively:
&lt;Layout&gt;
  &lt;Header /&gt;          {/* sent immediately */}
  &lt;Suspense fallback={&lt;Skeleton /&gt;}&gt;
    &lt;SlowDataSection /&gt;  {/* streamed later when data is ready */}
  &lt;/Suspense&gt;
  &lt;Footer /&gt;           {/* sent immediately */}
&lt;/Layout&gt;</pre>
<p><strong>Selective Hydration</strong> allows React to hydrate interactive sections <strong>independently and in priority order</strong>:</p>
<ul>
<li>If the user clicks on a section that hasn't hydrated yet, React <strong>prioritizes hydrating that section</strong> over others.</li>
<li>Non-visible or non-interacted sections hydrate later or on idle.</li>
</ul>
<p><strong>Combined effect:</strong> Users see content faster (streaming) and can interact sooner (selective hydration). Time to First Byte (TTFB) and First Contentful Paint (FCP) improve dramatically.</p>
<div class="dotnet-note">Streaming SSR is like ASP.NET Core's response streaming with <code>IAsyncEnumerable</code> — you start sending data before the entire result set is ready. Selective hydration is like lazy-loading Blazor WebAssembly components — only the sections the user interacts with are loaded first.</div>`

</ul>
<pre>// ✅ Fix: use functional updater

setCount(prev => prev + 1);
setCount(prev => prev + 1);
// Now count will be 3 after render</pre>

<pre>const [user, setUser] = useState({ name: 'Alice' });

setUser({ name: 'Alice' }); // different object in memory

// ✅ This does NOT cause a re-render — same reference

<div class="tricky-note">This is especially tricky for developers coming from mutable-by-default languages. React requires immutable updates — same reference = same state = no re-render. With RTK's Immer, you can write mutation syntax and it handles immutability for you.</div>`

<li>To prepare for <strong>Offscreen API</strong> (future feature) where components can be hidden/shown without unmounting, preserving state.</li>
<li>To encourage writing <strong>idempotent effects</strong> that can be safely re-run.</li>

useEffect(() => {

// Render
const list = document.getElementById('qa-list');

function renderCards(filter = 'all') {
  const filtered = filter === 'all' ? questions : questions.filter(q => q.category === filter);
  list.innerHTML = '';
  filtered.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'qa-card';
    card.dataset.category = q.category;
    card.innerHTML = `
      <div class="qa-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="q-num">${String(i + 1).padStart(2, '0')}</div>
        <div class="q-content">
          <div class="q-text">${q.q}</div>
          <div class="q-meta">
            <span class="cat-dot"></span>
            <span class="cat-label">${catLabels[q.category] || q.category}</span>
            <span class="diff-badge">${q.difficulty}</span>
          </div>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="qa-answer">
        <div class="qa-answer-inner">${q.a}</div>
      </div>
    `;
    list.appendChild(card);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.cat);
  });
});

document.getElementById('expandAll').addEventListener('click', () => {
  document.querySelectorAll('.qa-card').forEach(c => c.classList.add('open'));
});
document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.qa-card').forEach(c => c.classList.remove('open'));
});

renderCards();
</script>
